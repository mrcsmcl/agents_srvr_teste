x-shared: &shared
  restart: always
  user: "${N8N_USER:-0:0}"
  environment:
    - DB_TYPE=${DB_TYPE:-postgresdb}
    - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-postgres}
    - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_HOST=${N8N_HOST}
    - N8N_PROTOCOL=${N8N_PROTOCOL}
    - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
    - N8N_RUNNERS_MODE=${N8N_RUNNERS_MODE:-external}
    - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=${N8N_RUNNERS_BROKER_LISTEN_ADDRESS:-0.0.0.0}
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=${OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS:-true}
    - NODE_ENV=${NODE_ENV}
    - WEBHOOK_URL=${N8N_PROTOCOL}://${N8N_HOST}:${N8N_PORT}/
    - WEBHOOK_TUNNEL_URL=${N8N_PROTOCOL}://${N8N_HOST}/
    - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
    - EXECUTIONS_MODE=${EXECUTIONS_MODE:-queue}
    - QUEUE_BULL_REDIS_HOST=${QUEUE_BULL_REDIS_HOST:-redis}
    - QUEUE_HEALTH_CHECK_ACTIVE=${QUEUE_HEALTH_CHECK_ACTIVE:-true}
    - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
  volumes:
    - ${HOST_N8N_STORAGE}:/home/node/.n8n
  depends_on:
    - postgres
    - redis
  extra_hosts:
    - "host.docker.internal:host-gateway"      
  networks:
    - HoloNet

services:
  postgres:
    profiles:
      - enabled  
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_NON_ROOT_USER=${POSTGRES_NON_ROOT_USER}
      - POSTGRES_NON_ROOT_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    ports:
      - "${HOST_POSTGRES_PORT:-54322}:5432"
    volumes:
      - ${HOST_DB_STORAGE}:/var/lib/postgresql/data
      - ${HOST_INIT_DB_SCRIPT}:/docker-entrypoint-initdb.d/init-data.sh
    networks:
      - HoloNet  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HC_INTERVAL_POSTGRES:-${HC_INTERVAL:-30s}}
      timeout: ${HC_TIMEOUT_POSTGRES:-${HC_TIMEOUT:-5s}}
      retries: ${HC_RETRIES_POSTGRES:-${HC_RETRIES:-5}}
      start_period: ${HC_START_PERIOD_POSTGRES:-${HC_START_PERIOD:-20s}}

  redis:
    profiles:
      - enabled  
    image: ${REDIS_IMAGE:-redis:7.0-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}   
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - ${HOST_REDIS_STORAGE}:/data
    networks:
      - HoloNet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: ${HC_INTERVAL_REDIS:-${HC_INTERVAL:-30s}}
      timeout: ${HC_TIMEOUT_REDIS:-${HC_TIMEOUT:-5s}}
      retries: ${HC_RETRIES_REDIS:-${HC_RETRIES:-5}}
      start_period: ${HC_START_PERIOD_REDIS:-${HC_START_PERIOD:-10s}}

  n8n:
    profiles:
      - enabled  
    <<: *shared
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    container_name: ${N8N_CONTAINER_NAME:-n8n}
    command: start
    ports:
      - "${N8N_PORT}:5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: ${HC_INTERVAL_N8N:-${HC_INTERVAL:-60s}}
      timeout: ${HC_TIMEOUT_N8N:-${HC_TIMEOUT:-10s}}
      retries: ${HC_RETRIES_N8N:-${HC_RETRIES:-5}}
      start_period: ${HC_START_PERIOD_N8N:-${HC_START_PERIOD:-180s}}

  n8n-worker:
    profiles:
      - enabled  
    <<: *shared
    container_name: ${N8N_WORKER_CONTAINER_NAME:-n8n_worker}
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    command: worker
    depends_on:
      - postgres
      - redis
      - n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://n8n:5678/healthz || exit 1"]
      interval: ${HC_INTERVAL_N8N_WORKER:-${HC_INTERVAL:-60s}}
      timeout: ${HC_TIMEOUT_N8N_WORKER:-${HC_TIMEOUT:-10s}}
      retries: ${HC_RETRIES_N8N_WORKER:-${HC_RETRIES:-3}}
      start_period: ${HC_START_PERIOD_N8N_WORKER:-${HC_START_PERIOD:-60s}}

  n8n-runner:
    profiles:
      - enabled  
    image: ${N8N_RUNNERS_IMAGE:-n8nio/runners:latest}
    container_name: ${N8N_RUNNER_CONTAINER_NAME:-n8n_runner}
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=${N8N_RUNNERS_TASK_BROKER_URI:-http://n8n:5679}
      - N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT=${N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT:-15}
    depends_on:
      - n8n-worker
    networks:
      - HoloNet

  waha:
    profiles:
      - disabled
    image: ${WAHA_IMAGE:-devlikeapro/waha:arm}
    container_name: ${WAHA_CONTAINER_NAME:-waha}
    environment:
      WHATSAPP_HOOK_URL: ${N8N_PROTOCOL}://${N8N_HOST}:${N8N_PORT}/
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE:-GOWS}
      WHATSAPP_HOOK_EVENTS: ${WHATSAPP_HOOK_EVENTS:-message}
      WAHA_API_KEY: ${WAHA_API_KEY} 
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - ${HOST_WAHA_SESSIONS}:/app/.sessions
      - ${HOST_WAHA_MEDIA}:/app/.media
    ports:
      - "${HOST_WAHA_PORT:-3510}:3000"      
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    restart: unless-stopped 
    networks:
      - HoloNet
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -H \"X-Api-Key: ${WAHA_API_KEY}\" http://localhost:3000/api/server/status || exit 1"]
      interval: ${HC_INTERVAL_WAHA:-${HC_INTERVAL:-60s}}
      timeout: ${HC_TIMEOUT_WAHA:-${HC_TIMEOUT:-10s}}
      retries: ${HC_RETRIES_WAHA:-${HC_RETRIES:-3}}
      start_period: ${HC_START_PERIOD_WAHA:-${HC_START_PERIOD:-90s}}

  evolution:
    profiles:
      - enabled  
    container_name: ${EVOLUTION_CONTAINER_NAME:-evolution}
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-api:latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      CONFIG_SESSION_PHONE_VERSION: ${CONFIG_SESSION_PHONE_VERSION}
      DATABASE_ENABLED: "${DATABASE_ENABLED}"
      DATABASE_PROVIDER: "${DATABASE_PROVIDER}"
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_NON_ROOT_USER}:${POSTGRES_NON_ROOT_PASSWORD}@${DB_POSTGRESDB_HOST:-postgres}:${DB_POSTGRESDB_PORT:-5432}/${EVOLUTION_DB:-evolution}"
      DATABASE_CONNECTION_CLIENT_NAME: "${DATABASE_CONNECTION_CLIENT_NAME}"
      DATABASE_SAVE_DATA_INSTANCE: "${DATABASE_SAVE_DATA_INSTANCE}"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "${DATABASE_SAVE_DATA_NEW_MESSAGE}"
      DATABASE_SAVE_MESSAGE_UPDATE: "${DATABASE_SAVE_MESSAGE_UPDATE}"
      DATABASE_SAVE_DATA_CONTACTS: "${DATABASE_SAVE_DATA_CONTACTS}"
      DATABASE_SAVE_DATA_CHATS: "${DATABASE_SAVE_DATA_CHATS}"
      DATABASE_SAVE_DATA_LABELS: "${DATABASE_SAVE_DATA_LABELS}"
      DATABASE_SAVE_DATA_HISTORIC: "${DATABASE_SAVE_DATA_HISTORIC}"
      CACHE_REDIS_ENABLED: "${CACHE_REDIS_ENABLED}"
      CACHE_REDIS_URI: "redis://:${REDIS_PASSWORD}@${QUEUE_BULL_REDIS_HOST:-redis}:6379"
      CACHE_REDIS_PREFIX_KEY: "${CACHE_REDIS_PREFIX_KEY}"
      CACHE_REDIS_SAVE_INSTANCES: "${CACHE_REDIS_SAVE_INSTANCES}"
      CACHE_LOCAL_ENABLED: "${CACHE_LOCAL_ENABLED}"    
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
    ports:
      - "${HOST_EVOLUTION_PORT:-8480}:8080"
    volumes:
      - ${HOST_EVOLUTION_INSTANCES}:/evolution/instances
    networks:
      - HoloNet
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: ${HC_INTERVAL_EVOLUTION:-${HC_INTERVAL:-60s}}
      timeout: ${HC_TIMEOUT_EVOLUTION:-${HC_TIMEOUT:-10s}}
      retries: ${HC_RETRIES_EVOLUTION:-${HC_RETRIES:-3}}
      start_period: ${HC_START_PERIOD_EVOLUTION:-${HC_START_PERIOD:-60s}}

networks:
  HoloNet:
    external:
      name: ${NETWORK_NAME:-HoloNet}
